<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta Regresiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;500&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1d1f33;
            color: #fff;
            font-family: 'Roboto', sans-serif;
            background-image: url('nonelink.com');
            background-size: cover;
            background-position: center;
            background-blend-mode: overlay;
        }
        .countdown {
            text-align: center;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }
        .countdown h1 {
            font-size: 2.5rem;
            font-weight: 500;
            margin-bottom: 20px;
            color: #e0e0e0;
        }
        .time {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 500;
            color: #00ffab;
        }
        .countdown span {
            font-size: 1.2rem;
            color: #aaa;
            display: block;
            margin-top: 10px;
        }
        .clock-timer {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="countdown">
        <img class="clock-timer" src="https://www.shutterstock.com/image-vector/clock-face-icon-symbol-watch-600nw-2404492541.jpg" alt="Icono" width="80">
        
        <div id="display-container">
            <div id="time" class="time">Cargando...</div>
            <span id="target-text">Target Date</span>
            <button id="rolaBtn" type="button" class="btn btn-dark" hidden>Que suene la rola</button>
            <button id="resetBtn" class="btn btn-sm btn-outline-danger mt-4" style="display:block; margin:auto;">Cambiar fecha</button>
        </div>

        <div id="setup-container" style="display: none;">
            <h2 class="mb-4">Elige tu fecha objetivo</h2>
            <input type="date" id="dateInput" class="form-control mb-3">
            <button id="saveDateBtn" class="btn btn-success w-100">Iniciar Cuenta Regresiva</button>
        </div>

    </div>
    <audio id="ovationSound" src="audio/Astronomia.mp3" preload="auto"></audio>
    <script src="countdown.js"></script>
</body>
</html>
